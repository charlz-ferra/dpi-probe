name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: install
        run: pip install -e '.[dev]'
      - name: ruff
        run: |
          ruff check .
          ruff format --check .
      - name: pytest
        run: pytest -q
      - name: smoke (CLI imports & runs)
        run: |
          python -m dpiprobe --version
          dpi-probe --version
